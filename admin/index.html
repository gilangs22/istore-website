<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login - iStore Admin</title>
        <link rel="stylesheet" href="styles.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
    </head>
    <body class="login-page">
        <div class="login-container">
            <div class="login-box">
                <div class="login-header">
                    <div class="login-logo">
                        <i class="fas fa-mobile-alt"></i>
                        <span>iStore</span>
                    </div>
                    <h1>Admin Panel</h1>
                    <p>Masuk untuk mengelola produk</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user"></i>
                            Username
                        </label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Masukkan username"
                            required
                            autocomplete="username"
                        />
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <div class="password-input">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Masukkan password"
                                required
                                autocomplete="current-password"
                            />
                            <button
                                type="button"
                                class="toggle-password"
                                id="togglePassword"
                            >
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group remember">
                        <label class="checkbox-label">
                            <input
                                type="checkbox"
                                id="remember"
                                name="remember"
                            />
                            <span class="checkmark"></span>
                            Ingat saya
                        </label>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        <span>Masuk</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <div class="login-error" id="loginError">
                        <i class="fas fa-exclamation-circle"></i>
                        <span></span>
                    </div>
                </form>

                <div class="login-footer">
                    <p>
                        Default: <strong>admin</strong> /
                        <strong>admin123</strong>
                    </p>
                    <a href="../frontend/index.html">
                        <i class="fas fa-arrow-left"></i>
                        Kembali ke Website
                    </a>
                </div>
            </div>

            <div class="login-decoration">
                <div class="decoration-content">
                    <h2>Selamat Datang!</h2>
                    <p>
                        Kelola produk iPhone, casing, charger, dan aksesoris
                        dengan mudah.
                    </p>
                    <div class="features-list">
                        <div class="feature-item">
                            <i class="fas fa-box"></i>
                            <span>Kelola Produk</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-image"></i>
                            <span>Upload Gambar</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-chart-bar"></i>
                            <span>Lihat Statistik</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Simple login check
            document
                .getElementById("loginForm")
                .addEventListener("submit", function (e) {
                    e.preventDefault();

                    const username = document.getElementById("username").value;
                    const password = document.getElementById("password").value;
                    const loginBtn = document.getElementById("loginBtn");
                    const loginError = document.getElementById("loginError");

                    // Show loading
                    loginBtn.innerHTML =
                        '<i class="fas fa-spinner fa-spin"></i> Memproses...';
                    loginBtn.disabled = true;
                    loginError.classList.remove("show");

                    // Simulate login check (ganti dengan API call nanti)
                    setTimeout(() => {
                        // Default credentials: admin / admin123
                        if (username === "admin" && password === "admin123") {
                            // Save login state
                            sessionStorage.setItem("isLoggedIn", "true");
                            sessionStorage.setItem("adminUser", username);

                            // Redirect to dashboard
                            window.location.href = "dashboard.html";
                        } else {
                            // Show error
                            loginError.querySelector("span").textContent =
                                "Username atau password salah!";
                            loginError.classList.add("show");
                            loginBtn.innerHTML =
                                '<span>Masuk</span><i class="fas fa-arrow-right"></i>';
                            loginBtn.disabled = false;
                        }
                    }, 1000);
                });

            // Toggle password visibility
            document
                .getElementById("togglePassword")
                .addEventListener("click", function () {
                    const passwordInput = document.getElementById("password");
                    const icon = this.querySelector("i");

                    if (passwordInput.type === "password") {
                        passwordInput.type = "text";
                        icon.classList.remove("fa-eye");
                        icon.classList.add("fa-eye-slash");
                    } else {
                        passwordInput.type = "password";
                        icon.classList.remove("fa-eye-slash");
                        icon.classList.add("fa-eye");
                    }
                });

            // Check if already logged in
            if (sessionStorage.getItem("isLoggedIn") === "true") {
                window.location.href = "dashboard.html";
            }
        </script>
    </body>
</html>
